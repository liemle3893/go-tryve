name: Test

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Lint
        continue-on-error: true # golangci-lint does not yet support Go 1.25
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
